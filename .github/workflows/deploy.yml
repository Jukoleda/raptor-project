# Despliega el sitio en GitHub Pages en cada push a main.
#
# Regenera las páginas autocontenidas (build-standalone.mjs) antes de publicar,
# así lo desplegado siempre coincide con el source aunque alguien olvide
# regenerar los .html a mano. Sirve la raíz del repo: index.html (la portada)
# como página de inicio y engine/editor/tanks .html como demos.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; cancela los que queden obsoletos por uno más nuevo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerar páginas autocontenidas
        run: node tools/build-standalone.mjs
      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita Pages automáticamente en el primer despliegue.
          enablement: true
      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
